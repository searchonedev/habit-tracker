<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paulo's Habit Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 3rem; }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .quote { font-style: italic; color: #888; font-size: 0.9rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-4px); }
        .stat-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #00d4ff; }
        .stat-label { color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .habits-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .habits-section h2 { margin-bottom: 1.5rem; font-size: 1.3rem; color: #aaa; }
        .habit-row {
            display: flex;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .habit-row:last-child { border-bottom: none; }
        .habit-icon { font-size: 1.8rem; width: 50px; }
        .habit-info { flex: 1; }
        .habit-name { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.3rem; }
        .habit-streak { font-size: 0.85rem; color: #00d4ff; }
        .progress-bar {
            width: 150px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .progress-fill.qigong { background: linear-gradient(90deg, #00d4ff, #00ff88); }
        .progress-fill.meditation { background: linear-gradient(90deg, #7c3aed, #d946ef); }
        .progress-fill.pushups { background: linear-gradient(90deg, #f59e0b, #ef4444); }
        .weekly-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            margin-top: 2rem;
        }
        .day-column { text-align: center; }
        .day-label { font-size: 0.75rem; color: #666; margin-bottom: 0.5rem; text-transform: uppercase; }
        .day-slots { display: flex; flex-direction: column; gap: 0.25rem; }
        .day-slot {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            margin: 0 auto;
        }
        .day-slot.done { background: #00ff88; color: #000; }
        .day-slot.partial { background: #f59e0b; color: #000; }
        .day-slot.missed { background: rgba(255, 255, 255, 0.1); }
        .legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: 1.5rem; font-size: 0.8rem; color: #666; }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
        .legend-dot.done { background: #00ff88; }
        .legend-dot.partial { background: #f59e0b; }
        .legend-dot.missed { background: rgba(255, 255, 255, 0.1); }
        .last-updated { text-align: center; margin-top: 2rem; color: #555; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Paulo's Habit Tracker</h1>
            <p class="quote">"You do not rise to the level of your goals. You fall to the level of your systems." — James Clear</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="currentStreak">-</div>
                <div class="stat-label">Current Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-value" id="bestStreak">-</div>
                <div class="stat-label">Best Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="completionRate">-</div>
                <div class="stat-label">This Week</div>
            </div>
        </div>
        
        <div class="habits-section">
            <h2>Daily Habits</h2>
            
            <div class="habit-row">
                <div class="habit-icon">🧘</div>
                <div class="habit-info">
                    <div class="habit-name">Qi Gong</div>
                    <div class="habit-streak" id="qigongStreak">-</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill qigong" id="qigongProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="habit-row">
                <div class="habit-icon">🧠</div>
                <div class="habit-info">
                    <div class="habit-name">Meditation (15+ min)</div>
                    <div class="habit-streak" id="meditationStreak">-</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill meditation" id="meditationProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="habit-row">
                <div class="habit-icon">💪</div>
                <div class="habit-info">
                    <div class="habit-name">Push-ups (goal: 100)</div>
                    <div class="habit-streak" id="pushupsStreak">-</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill pushups" id="pushupsProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="weekly-grid">
                <div class="day-column"><div class="day-label">Mon</div><div class="day-slots"><div class="day-slot" id="mon-qigong"></div><div class="day-slot" id="mon-meditation"></div><div class="day-slot" id="mon-pushups"></div></div></div>
                <div class="day-column"><div class="day-label">Tue</div><div class="day-slots"><div class="day-slot" id="tue-qigong"></div><div class="day-slot" id="tue-meditation"></div><div class="day-slot" id="tue-pushups"></div></div></div>
                <div class="day-column"><div class="day-label">Wed</div><div class="day-slots"><div class="day-slot" id="wed-qigong"></div><div class="day-slot" id="wed-meditation"></div><div class="day-slot" id="wed-pushups"></div></div></div>
                <div class="day-column"><div class="day-label">Thu</div><div class="day-slots"><div class="day-slot" id="thu-qigong"></div><div class="day-slot" id="thu-meditation"></div><div class="day-slot" id="thu-pushups"></div></div></div>
                <div class="day-column"><div class="day-label">Fri</div><div class="day-slots"><div class="day-slot" id="fri-qigong"></div><div class="day-slot" id="fri-meditation"></div><div class="day-slot" id="fri-pushups"></div></div></div>
                <div class="day-column"><div class="day-label">Sat</div><div class="day-slots"><div class="day-slot" id="sat-qigong"></div><div class="day-slot" id="sat-meditation"></div><div class="day-slot" id="sat-pushups"></div></div></div>
                <div class="day-column"><div class="day-label">Sun</div><div class="day-slots"><div class="day-slot" id="sun-qigong"></div><div class="day-slot" id="sun-meditation"></div><div class="day-slot" id="sun-pushups"></div></div></div>
            </div>
            
            <div class="legend">
                <div class="legend-item"><div class="legend-dot done"></div> Done</div>
                <div class="legend-item"><div class="legend-dot partial"></div> Partial</div>
                <div class="legend-item"><div class="legend-dot missed"></div> Missed</div>
            </div>
        </div>
        
        <div class="last-updated" id="lastUpdated"></div>
    </div>
    
    <script>
        // Fetch from data.json
        fetch('https://raw.githubusercontent.com/searchonedev/habit-tracker/master/data.json')
            .then(response => response.json())
            .then(data => {
                const habits = data.habits;
                
                // Calculate consecutive streak (working backwards from end of week)
                function calcConsecutiveStreak(thisWeek, isPushups) {
                    let streak = 0;
                    // Start from Friday (index 4), go backwards
                    for (let i = 4; i >= 0; i--) {
                        if (isPushups) {
                            if (thisWeek[i] > 0) streak++;
                            else break;
                        } else {
                            if (thisWeek[i] === true) streak++;
                            else break;
                        }
                    }
                    return streak;
                }
                
                // Current streak = consecutive days up to (and including) Friday
                const qigongStreak = calcConsecutiveStreak(habits.qigong.thisWeek, false);
                const meditationStreak = calcConsecutiveStreak(habits.meditation.thisWeek, false);
                const pushupsStreak = calcConsecutiveStreak(habits.pushups.thisWeek, true);
                
                const maxStreak = Math.max(qigongStreak, meditationStreak, pushupsStreak);
                const maxBest = Math.max(
                    habits.qigong.bestStreak,
                    habits.meditation.bestStreak,
                    habits.pushups.bestStreak
                );
                
                document.getElementById('currentStreak').textContent = maxStreak + ' days';
                document.getElementById('bestStreak').textContent = maxBest + ' days';
                
                // This week completion
                let daysDone = 0;
                ['qigong', 'meditation', 'pushups'].forEach(h => {
                    const isPushups = h === 'pushups';
                    habits[h].thisWeek.forEach((val, i) => {
                        if (i <= 4) { // Mon-Fri
                            if (isPushups ? val > 0 : val === true) daysDone++;
                        }
                    });
                });
                const completionRate = Math.round((daysDone / 15) * 100); // 3 habits * 5 days
                document.getElementById('completionRate').textContent = completionRate + '%';
                
                // Update habit rows
                document.getElementById('qigongStreak').textContent = qigongStreak + ' day streak';
                document.getElementById('meditationStreak').textContent = meditationStreak + ' day streak';
                document.getElementById('pushupsStreak').textContent = pushupsStreak + ' day streak';
                
                // Progress bars
                document.getElementById('qigongProgress').style.width = (qigongStreak / 7 * 100) + '%';
                document.getElementById('meditationProgress').style.width = (meditationStreak / 7 * 100) + '%';
                document.getElementById('pushupsProgress').style.width = (Math.min(pushupsStreak, 7) / 7 * 100) + '%';
                
                // Update weekly grid
                const days = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
                const habitsList = ['qigong', 'meditation', 'pushups'];
                
                days.forEach((day, dayIndex) => {
                    habitsList.forEach(habit => {
                        const el = document.getElementById(`${day}-${habit}`);
                        const status = habits[habit].thisWeek[dayIndex];
                        if (habit === 'pushups') {
                            if (status > 0) {
                                el.classList.add(status >= 100 ? 'done' : 'partial');
                                el.textContent = status;
                            } else {
                                el.classList.add('missed');
                            }
                        } else {
                            if (status === true) {
                                el.classList.add('done');
                                el.textContent = '✓';
                            } else {
                                el.classList.add('missed');
                            }
                        }
                    });
                });
                
                const date = new Date(data.lastUpdated);
                document.getElementById('lastUpdated').textContent = 'Last updated: ' + date.toLocaleDateString();
            })
            .catch(err => {
                console.error('Error loading habit data:', err);
                document.getElementById('currentStreak').textContent = 'Error';
            });
    </script>
</body>
</html>
